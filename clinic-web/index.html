<link rel="preconnect" href="https://fonts.googleapis.com" />

<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body, #root { height: 100%; }
  body {
    background: var(--page);
    overflow: hidden;
  }
  .page-aurora {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse at 14% 12%, rgba(127, 174, 146, 0.14) 0%, transparent 50%),
      radial-gradient(ellipse at 88% 86%, rgba(196, 166, 214, 0.10) 0%, transparent 50%);
  }
  .theme-dark .page-aurora {
    background:
      radial-gradient(ellipse at 14% 12%, rgba(127, 174, 146, 0.10) 0%, transparent 50%),
      radial-gradient(ellipse at 88% 86%, rgba(196, 166, 214, 0.08) 0%, transparent 50%);
  }
  /* fill the iframe with the dashboard directly — chrome (sidebar/topbar) IS the framing */
  #root {
    position: relative; z-index: 1;
    display: flex;
    height: 100vh;
  }
</style>
</head>
<body>

<div class="page-aurora"></div>
<div id="root"></div>
